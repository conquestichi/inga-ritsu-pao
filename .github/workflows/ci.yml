name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Test
        run: pytest tests/ -v --cov=ritsu_pao --cov-fail-under=80

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          X_CREDS: ${{ secrets.X_CREDENTIALS_JSON }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: X_CREDS
          script: |
            cd /srv/inga/inga-ritsu-pao
            git fetch origin main
            git reset --hard origin/main
            pip install -e . --break-system-packages -q
            # X API credentials (from GitHub Secret)
            if [ -n "$X_CREDS" ]; then
              echo "$X_CREDS" > /srv/inga/config/x_credentials.json
              chmod 600 /srv/inga/config/x_credentials.json
              echo "[deploy] x_credentials.json written"
            fi
            echo "[deploy] $(date '+%Y-%m-%d %H:%M:%S') — deployed $(git rev-parse --short HEAD)"
